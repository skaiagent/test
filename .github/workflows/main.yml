name: A.X Studio API Key Test
on: [workflow_dispatch]

jobs:
  test-api:
    runs-on: ubuntu-latest
    steps:
      - name: A.X Studio 빌더 API 상태 코드 확인
        env:
          # Settings에 등록한 시크릿 변수명과 반드시 일치시킬 것
          MY_API_KEY: ${{ secrets.SK_API_KEY }} 
        run: |
          echo "A.X Studio API 서버에 테스트 요청을 전송 중..."
          
          ENDPOINT_URL="https://adxp.adotbiz.ai/api/v1/agent_gateway/a12a12c8-84f5-4aae-922c-08cdc8d03f8a"
          
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $MY_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"messages": [{"role": "user", "content": "ping"}]}' \
            $ENDPOINT_URL)
          
          echo "API 응답 코드: $HTTP_STATUS"
          
          if [ "$HTTP_STATUS" -eq 200 ]; then
            echo "✅ 정상 작동 확인 (200 OK): 권한 및 연동 문제 없음"
          elif [ "$HTTP_STATUS" -eq 400 ]; then
            echo "⚠️ 잘못된 요청 (400 Bad Request): API 규격(헤더 또는 파라미터) 확인 필요"
            exit 1
          elif [ "$HTTP_STATUS" -eq 401 ] || [ "$HTTP_STATUS" -eq 403 ]; then
            echo "❌ 인증 실패 ($HTTP_STATUS): 키가 잘못되었거나 권한이 없음"
            exit 1
          elif [ "$HTTP_STATUS" -eq 429 ]; then
            echo "❌ 한도 초과 (429 Too Many Requests): 크레딧 부족 또는 호출 제한"
            exit 1
          else
            echo "⚠️ 기타 오류 발생: 응답 코드 $HTTP_STATUS"
            exit 1
          fi
